cameras:
  patio:
    width: 640
    height: 480
    fps: 5
    snapshots:
      enabled: true
      bounding_box: true
      required_zones:
        - deck_stairs
        - back_door
      retain:
        default: 2
        objects:
          person: 14
    clips:
      enabled: true
      required_zones:
        - deck_stairs
        - back_door
      retain:
        default: 2
        objects:
          person: 14
    objects:
      track:
        - person
        - cat
        - dog
        - mouse
    zones:
      patio_couch:
        coordinates: 738,1164,1288,996,1243,669,1062,505,567,569,580,842
      deck_stairs:
        coordinates: 1533,352,2212,1030,1925,1324,1558,1042,1288,431
      back_door:
        coordinates: 0,970,0,605,296,550,748,1409,168,1496
    motion:
      mask:
        - 2560,0,2539,1125,1758,850,1829,512,1693,273,1085,307,1296,450,1415,727,1473,842,1569,998,1445,1027,1302,827,1209,893,1249,688,1074,571,582,648,567,825,365,878,255,393,0,439,0,0
        - 1695,1920,1695,1830,835,1830,835,1920
    ffmpeg:
      inputs:
        - path: rtsp://{FRIGATE_CAMERA_USER}:{FRIGATE_CAMERA_PASSWORD}@{FRIGATE_PATIO_IP}:554//h264Preview_01_main
          roles:
            - clips
            - record
        - path: rtsp://{FRIGATE_CAMERA_USER}:{FRIGATE_CAMERA_PASSWORD}@{FRIGATE_PATIO_IP}:554//h264Preview_01_sub
          roles:
            - rtmp
            - detect
  garage:
    width: 640
    height: 480
    fps: 5
    snapshots:
      enabled: true
      bounding_box: true
      required_zones:
        - garage_door
        - trash_cans
        - garage_entry
      retain:
        default: 2
        objects:
          person: 14
    clips:
      enabled: true
      required_zones:
        - garage_door
        - trash_cans
        - garage_entry
      retain:
        default: 2
        objects:
          person: 14
    objects:
      track:
        - person
        - dog
    zones:
      garage_door:
        coordinates: 190,1010,246,0,0,0,0,414,0,1019,0,1347,0,1920,285,1920
      garage_entry:
        coordinates: 1824,566,2142,671,2306,244,2040,116
      trash_cans:
        coordinates: 1438,445,1736,541,1891,269,1552,90
    motion:
      mask:
        - 2560,0,2560,411,1804,0
        - 856,430,1500,472,1912,629,2560,1376,1370,1920,444,1920,366,441
        - 1695,1920,1695,1830,835,1830,835,1920
    ffmpeg:
      inputs:
        - path: rtsp://{FRIGATE_CAMERA_USER}:{FRIGATE_CAMERA_PASSWORD}@{FRIGATE_GARAGE_IP}:554//h264Preview_01_main
          roles:
           - clips
           - record
        - path: rtsp://{FRIGATE_CAMERA_USER}:{FRIGATE_CAMERA_PASSWORD}@{FRIGATE_GARAGE_IP}:554//h264Preview_01_sub
          roles:
           - detect
           - rtmp
