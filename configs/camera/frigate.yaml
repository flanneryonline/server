cameras:
  patio:
    width: 2304
    height: 1296
    record:
      enabled: true
      retain_days: 7
    snapshots:
      enabled: true
      bounding_box: true
      retain:
        default: 2
        objects:
          person: 14
    clips:
      enabled: true
      required_zones:
        - deck_stairs
        - back_door
      retain:
        default: 2
        objects:
          person: 14
    objects:
      track:
        - person
        - cat
        - dog
        - mouse
    zones:
      patio_couch:
        coordinates: 265,108,319,177,328,259,170,298,131,136
      deck_stairs:
        coordinates: 500,173,573,269,433,320,367,257,300,76,417,80
      back_door:
        coordinates: 179,422,67,99,0,111,0,256,85,480
    motion:
      mask:
        - 421,480,416,443,198,437,197,480
        - 0,267,0,480,80,480
        - 0,0,0,102,187,81,415,71,478,112,640,189,640,0
    ffmpeg:
      inputs:
        - path: rtsp://{FRIGATE_CAMERA_USER}:{FRIGATE_CAMERA_PASSWORD}@{FRIGATE_PATIO_IP}:554//h264Preview_01_main
          roles:
            - clips
            - record
            - rtmp
            - detect
  garage:
    width: 2304
    height: 1296
    record:
      enabled: true
      retain_days: 7
    snapshots:
      enabled: true
      bounding_box: true
      retain:
        default: 2
        objects:
          person: 14
    clips:
      enabled: true
      required_zones:
        - garage_door
        - trash_cans
        - garage_entry
      retain:
        default: 2
        objects:
          person: 14
    objects:
      track:
        - person
        - dog
    zones:
      garage_door:
        coordinates: 81,0,0,0,0,480,87,480
      garage_entry:
        coordinates: 432,128,500,0,583,65,528,181
      trash_cans:
        coordinates: 340,0,300,113,451,139,492,49
    motion:
      mask:
        - 463,0,640,0,640,98
        - 65,49,296,34,640,281,416,480,74,480
    ffmpeg:
      inputs:
        - path: rtsp://{FRIGATE_CAMERA_USER}:{FRIGATE_CAMERA_PASSWORD}@{FRIGATE_GARAGE_IP}:554//h264Preview_01_main
          roles:
           - clips
           - detect
           - rtmp
           - record
