http:
  routers:
    router:
      entryPoints:
        - web
      middlewares:
        - https-redirect@file
      service: router
    router-secure:
      entryPoints:
        - websecure
      rule: "Host(`router.flanneryonline.com`)"
      tls:
        certResolver: leresolver
      service: router
  services:
    router:
      loadBalancer:
        servers:
          - url: "http://10.0.0.1:8888"
