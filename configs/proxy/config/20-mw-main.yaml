http:
  middlewares:
    rate-limit:
      rateLimit:
        average: 100
        burst: 50
    internal-auth:
      chain:
        middlewares:
          - rate-limit
          - secure-headers
    oauth:
      chain:
        middlewares:
          - rate-limit
          - secure-headers
          - mw-oauth
    # authelia:
    #   chain:
    #     middlewares:
    #       - rate-limit
    #       - secure-headers
    #       - mw-authelia
    nextcloud:
      chain:
        middlewares:
          - rate-limit
          - nextcloud-secure-headers
          - nextcloud-redirect