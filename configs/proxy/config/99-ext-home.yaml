http:
  routers:
    home:
      entryPoints:
        - web
      middlewares:
        - https-redirect@file
      service: home
    home-secure:
      entryPoints:
        - websecure
      rule: "Host(`home.flanneryonline.com`)"
      tls:
        certResolver: leresolver
      service: home
  services:
    home:
      loadBalancer:
        servers:
          - url: "http://homeassistant.flanneryonline.com:8123"
