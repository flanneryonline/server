version: '3.2'

volumes:
    nextcloud_data:
        driver: local
        driver_opts:
            o: bind
            type: none
            device: $STORAGE_CONFIG_DIR/nextcloud
    nextcloud_db_data:
        driver: local
        driver_opts:
            o: bind
            type: none
            device: $STORAGE_CONFIG_DIR/nextcloud_db
    config_data:
        driver: local
        driver_opts:
            o: bind
            type: none
            device: $STORAGE_CONFIG_DIR
    media_data:
        driver: local
        driver_opts:
            o: bind
            type: none
            device: $STORAGE_MEDIA_DIR
    download_data:
        driver: local
        driver_opts:
            o: bind
            type: none
            device: $STORAGE_DOWNLOAD_DIR
    share_data:
        driver: local
        driver_opts:
            o: bind
            type: none
            device: $STORAGE_SHARE_DIR

services:
    nextcloud_db:
        image: mariadb
        container_name: nextcloud_db
        restart: always
        command: --transaction-isolation=READ-COMMITTED --binlog-format=ROW
        volumes:
            - nextcloud_db_data:/var/lib/mysql
        environment:
            - MYSQL_ROOT_PASSWORD_FILE=/run/secrets/mysql_password
            - MYSQL_DATABASE=nextcloud
            - MYSQL_USER=nextcloud
            - MYSQL_PASSWORD_FILE=/run/secrets/mysql_password
        secrets:
            - mysql_password

    nextcloud:
        image: nextcloud
        container_name: nextcloud
        restart: always
        ports:
            - 8077:80
        volumes:
            - nextcloud_data:/var/www/html
            - download_data:/var/www/html/data/download
            - media_data:/var/www/html/data/media
            - config_data:/var/www/html/data/configs
            - share_data:/var/www/html/data/share
        depends_on:
            - nextcloud_db
        environment:
            - MYSQL_PASSWORD_FILE=/run/secrets/mysql_password
            - MYSQL_DATABASE=nextcloud
            - MYSQL_USER=nextcloud
            - MYSQL_HOST=nextcloud_db
            - NEXTCLOUD_ADMIN_PASSWORD_FILE=/run/secrets/nextcloud_admin_password
            - NEXTCLOUD_ADMIN_USER=$ADMIN_USERNAME
        secrets:
            - nextcloud_admin_password
            - mysql_password

secrets:
    nextcloud_admin_password:
        file: $STORAGE_SETTINGS_DIR/nextcloud_admin_password
    mysql_password:
        file: $STORAGE_SETTINGS_DIR/mysql_password