version: '3.2'

services:
    nextcloud_db:
        image: mariadb
        container_name: nextcloud_db
        restart: always
        networks:
            - nextcloud
        command: --transaction-isolation=READ-COMMITTED --binlog-format=ROW
        volumes:
            - $STORAGE_CONFIG_DIR/nextcloud_db:/var/lib/mysql
        environment:
            - MYSQL_ROOT_PASSWORD_FILE=/run/secrets/mysql_password
            - MYSQL_DATABASE=nextcloud
            - MYSQL_USER=nextcloud
            - MYSQL_PASSWORD_FILE=/run/secrets/mysql_password
        secrets:
            - mysql_password

    nextcloud:
        image: nextcloud
        container_name: nextcloud
        restart: always
        networks:
            - proxy
            - nextcloud
        # ports:
        #     - 8077:80
        volumes:
            - $STORAGE_CONFIG_DIR/nextcloud:/var/www/html
            - $STORAGE_DOWNLOAD_DIR:/var/www/html/data/download
            - $STORAGE_MEDIA_DIR:/var/www/html/data/media
            - $STORAGE_CONFIG_DIR:/var/www/html/data/configs
            - $STORAGE_SHARE_DIR:/var/www/html/data/share
        depends_on:
            - nextcloud_db
        environment:
            - MYSQL_PASSWORD_FILE=/run/secrets/mysql_password
            - MYSQL_DATABASE=nextcloud
            - MYSQL_USER=nextcloud
            - MYSQL_HOST=nextcloud_db
            - NEXTCLOUD_ADMIN_PASSWORD_FILE=/run/secrets/nextcloud_admin_password
            - NEXTCLOUD_ADMIN_USER=$ADMIN_USERNAME
            - NEXTCLOUD_TRUSTED_DOMAINS=hostserver.flanneryonline.com:8077 cloud.flanneryonline.com
        labels:
            - "traefik.enable=true"
            - "traefik.http.services.cloud.loadbalancer.server.port=80"
            - "traefik.http.routers.cloud.rule=Host(`cloud.flanneryonline.com`)"
            - "traefik.http.routers.cloud.middlewares=https-redirect@file,cloud-redirect"
            - "traefik.http.routers.cloud.service=cloud"
            - "traefik.http.routers.cloud-secure.rule=Host(`cloud.flanneryonline.com`)"
            - "traefik.http.routers.cloud-secure.tls=true"
            - "traefik.http.routers.cloud-secure.tls.certresolver=leresolver"
            - "traefik.http.routers.cloud-secure.service=cloud"
            - "traefik.docker.network=proxy"
            - "traefik.http.middlewares.cloud-redirect.redirectRegex.regex=https://(.*)/.well-known/(card|cal)dav"
            - "traefik.http.middlewares.cloud-redirect.redirectRegex.permanent=true"
            - "traefik.http.middlewares.cloud-redirect.redirectRegex.replacement=https://${1}/remote.php/dav/"
        secrets:
            - nextcloud_admin_password
            - mysql_password

secrets:
    nextcloud_admin_password:
        file: $STORAGE_SETTINGS_DIR/nextcloud_admin_password
    mysql_password:
        file: $STORAGE_SETTINGS_DIR/mysql_password

networks:
    nextcloud:
    proxy:
        external: true