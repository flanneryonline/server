version: "3.8"
services:

    camera-trigger:
        container_name: camera-trigger
        restart: always
        networks:
            - camera
        volumes:
            - /mnt/camera/@Snapshot:/aiinput
        environment:
            - TZ=$SERVER_TIMEZONE
        secrets:
            - triggers
            - settings
        image: danecreekphotography/node-deepstackai-trigger:latest
        depends_on:
            - deepstack-ai

    deepstack-ai:
        container_name: deepstack-ai
        restart: always
        networks:
            - camera
        volumes:
            - localstorage:/datastore
        environment:
            - VISION-DETECTION=True
        image: deepquestai/deepstack:latest

    screenshots:
        container_name: screenshots
        restart: always
        networks:
            - proxy
        labels:
            - "traefik.enable=true"
            - "traefik.http.services.camera.loadbalancer.server.port=80"
            - "traefik.http.routers.camera.entryPoints=web"
            - "traefik.http.routers.camera-secure.entryPoints=websecure"
            - "traefik.http.routers.camera.rule=Host(`camera.$SERVER_DOMAIN`)"
            - "traefik.http.routers.camera-secure.rule=Host(`camera.$SERVER_DOMAIN`)"
            - "traefik.http.routers.camera.middlewares=https-redirect@file"
            - "traefik.http.routers.camera-secure.middlewares=internal-auth@file"
            - "traefik.http.routers.camera.service=camera"
            - "traefik.http.routers.camera-secure.service=camera"
            - "traefik.http.routers.camera-secure.tls=true"
            - "traefik.http.routers.camera-secure.tls.certresolver=leresolver"
        volumes:
            - /mnt/camera/@Snapshot/:/usr/share/nginx/html:ro
        image: nginx

volumes:
    localstorage:

secrets:
    settings:
        file: $SERVER_INSTALL/configs/camera/settings.json
    triggers:
        file: $SERVER_INSTALL/configs/camera/triggers.json

networks:
    camera:
    proxy:
        external: true